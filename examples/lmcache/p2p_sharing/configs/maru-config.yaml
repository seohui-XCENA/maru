chunk_size: 256
local_cpu: True
max_local_cpu_size: 5
enable_async_loading: True

# P2P and Controller disabled for Maru shared storage mode
enable_p2p: False
enable_controller: False

# Maru remote backend
remote_url: "maru://localhost:${MARU_SERVER_PORT}"
remote_serde: "naive"

extra_config:
  maru_pool_size: "4G"
  save_chunk_meta: False
  lookup_backoff_time: 0.001
